<!-- userProfile.jsp -->
<!DOCTYPE html>
<html>
<head>
    <title>User Profile</title>
</head>
<body>
    <h2>Welcome, ${userName}!</h2>
    <p>Your email: ${userEmail}</p>
    <h2>User Profile</h2>
<p>Name: ${userName}</p>
<p>Email: ${userEmail}</p>
<%@ taglib uri="http://java.sun.com/jsp/jstl/core" prefix="c" %>

<h2>Order History</h2>
<ul>
    <c:forEach var="order" items="${orders}">
        <li>${order}</li>
    </c:forEach>
</ul>

</body>
</html>
